<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HQ - Spy Login Portal</title>
    <style>
        body { background-color: #0d0f12; color: #00ff66; font-family: 'Courier New', Courier, monospace; padding: 40px; }
        .login-box { border: 2px solid #00ff66; box-shadow: 0 0 15px #00ff66; padding: 30px; max-width: 400px; margin: 100px auto 0 auto; background-color: #14181d; }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; background-color: #0d0f12; border: 1px solid #00ff66; color: #00ff66; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        button { width: 100%; padding: 12px; background-color: #00ff66; color: #0d0f12; border: none; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; font-family: 'Courier New', Courier, monospace;}
        button:hover { background-color: #00cc52; box-shadow: 0 0 10px #00ff66; }
        .link-text { text-align: center; margin-top: 20px; font-size: 14px; }
        .link-text a { color: #ffcc00; text-decoration: none; font-weight: bold; }
        .flash-msg { padding: 10px; margin-bottom: 20px; border: 1px solid #00ff66; text-align: center; }
        .error { color: #ff3333; background-color: #1a0d0d; border-color: red; }
        .success { color: #00ff66; background-color: #0d1a11; border-color: #00ff66; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>[ System Auth ]</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-msg {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" name="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" name="password" required autocomplete="off">
            </div>
            <button type="submit">Authenticate</button>
        </form>
        <div class="link-text">
            New Recruits: <a href="/register">Register Credentials Here</a>
        </div>
    </div>
</body>
</html>
